<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Neon AI Chatbot</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    :root {
      --neon-purple: #a78bfa;
      --neon-glow: 0 0 10px #a78bfa, 0 0 20px #7c3aed66;
      --bg-dark: #0a0a14;
      --card-bg: #1a1a2ed9;
      --star-color: rgba(255, 255, 255, 0.7);
    }

    /* Hiệu ứng vũ trụ sao lấp lánh mờ ảo */
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: radial-gradient(ellipse at 40% 50%, #1e1033, #03010a);
      color: white;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      position: relative;
    }

    /* Tầng sao nền - hiệu ứng lấp lánh */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: 
        radial-gradient(1px 1px at 5% 10%, var(--star-color), rgba(0,0,0,0)),
        radial-gradient(1px 1px at 15% 30%, var(--star-color), rgba(0,0,0,0)),
        radial-gradient(2px 2px at 25% 60%, var(--star-color), rgba(0,0,0,0)),
        radial-gradient(1px 1px at 35% 85%, var(--star-color), rgba(0,0,0,0)),
        radial-gradient(2px 2px at 50% 20%, var(--star-color), rgba(0,0,0,0)),
        radial-gradient(1px 1px at 65% 45%, var(--star-color), rgba(0,0,0,0)),
        radial-gradient(2px 2px at 80% 70%, var(--star-color), rgba(0,0,0,0)),
        radial-gradient(1px 1px at 92% 35%, var(--star-color), rgba(0,0,0,0)),
        radial-gradient(2px 2px at 48% 92%, var(--star-color), rgba(0,0,0,0)),
        radial-gradient(3px 3px at 72% 15%, var(--star-color), rgba(0,0,0,0));
      background-repeat: no-repeat;
      opacity: 0.6;
      animation: twinkle 4s infinite alternate;
      pointer-events: none;
    }

    /* Hiệu ứng ánh sáng khuếch tán mờ ảo */
    body::after {
      content: "";
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 70% 30%, rgba(123, 31, 162, 0.2), transparent 40%),
                  radial-gradient(circle at 20% 80%, rgba(76, 29, 149, 0.2), transparent 40%);
      filter: blur(60px);
      pointer-events: none;
      animation: nebula 20s infinite alternate ease-in-out;
    }

    @keyframes twinkle {
      0% { opacity: 0.5; }
      100% { opacity: 0.9; }
    }

    @keyframes nebula {
      0% { transform: scale(1) rotate(0deg); opacity: 0.5; }
      100% { transform: scale(1.2) rotate(5deg); opacity: 0.8; }
    }

    .container {
      width: 90%;
      max-width: 600px;
      background: var(--card-bg);
      backdrop-filter: blur(8px);
      border-radius: 20px;
      box-shadow: var(--neon-glow), 0 0 30px #3b076450;
      overflow: hidden;
      border: 1px solid var(--neon-purple);
      position: relative;
      z-index: 2;
    }

    .header {
      background: linear-gradient(90deg, #2e1065b3, #4c1d95b3);
      padding: 20px;
      text-align: center;
      font-size: 1.8rem;
      font-weight: bold;
      text-shadow: 0 0 15px #a78bfa;
      backdrop-filter: blur(5px);
    }

    .admin-credit {
      text-align: center;
      font-size: 0.9rem;
      color: #c4b5fd;
      padding: 5px 0;
      background: rgba(0,0,0,0.3);
    }

    .api-section {
      padding: 15px;
      border-bottom: 1px solid #33415566;
    }

    .api-input {
      width: 100%;
      padding: 12px;
      background: #0f0f1fbf;
      border: 1px solid var(--neon-purple);
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      box-shadow: inset 0 0 5px #a78bfa66, 0 0 8px #7c3aed33;
      backdrop-filter: blur(4px);
      transition: all 0.3s;
    }

    .api-input:focus {
      outline: none;
      box-shadow: inset 0 0 8px #a78bfa, 0 0 15px #a78bfa;
    }

    .chat-area {
      height: 400px;
      overflow-y: auto;
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .message {
      max-width: 80%;
      padding: 12px 18px;
      border-radius: 18px;
      line-height: 1.5;
      animation: fadeIn 0.3s;
      backdrop-filter: blur(5px);
    }

    .user {
      align-self: flex-end;
      background: linear-gradient(90deg, #6d28d9cc, #a78bfacc);
      color: white;
      box-shadow: 0 0 15px #a78bfa66;
      border: 1px solid #ffffff33;
    }

    .bot {
      align-self: flex-start;
      background: #1a1a2ed9;
      border: 1px solid var(--neon-purple);
      box-shadow: var(--neon-glow);
      backdrop-filter: blur(10px);
      color: #f3e8ff;
    }

    .input-area {
      display: flex;
      padding: 15px;
      border-top: 1px solid #33415566;
    }

    .input-msg {
      flex: 1;
      padding: 12px;
      background: #0f0f1fbf;
      border: 1px solid var(--neon-purple);
      border-radius: 30px 0 0 30px;
      color: white;
      outline: none;
      backdrop-filter: blur(4px);
    }

    .input-msg:focus {
      box-shadow: inset 0 0 8px #a78bfa66;
    }

    .send-btn {
      padding: 12px 20px;
      background: var(--neon-purple);
      border: none;
      border-radius: 0 30px 30px 0;
      color: white;
      cursor: pointer;
      transition: all 0.3s;
      backdrop-filter: blur(4px);
    }

    .send-btn:hover { 
      background: #7c3aed; 
      box-shadow: var(--neon-glow), 0 0 20px #a78bfa; 
    }

    @keyframes fadeIn { 
      from { opacity: 0; transform: translateY(10px); } 
      to { opacity: 1; transform: translateY(0); } 
    }

    ::-webkit-scrollbar { width: 6px; } 
    ::-webkit-scrollbar-thumb { background: var(--neon-purple); border-radius: 10px; }
    a { text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Neon AI Chatbot</div>
    <div class="admin-credit">Made by tkhang</div>

    <div class="api-section">
      <!-- Đã ẩn API key và set mặc định là 123 -->
      <input type="password" id="apiKey" class="api-input" value="123" placeholder="API Key (ẩn) mặc định: 123" />
    </div>

    <div class="chat-area" id="chatArea">
      <div class="message bot">
        ✨ Xin chào! Tôi là AI Assistant neon của bạn 💜<br>
        API key mặc định đã được điền sẵn (***). <br>
        Bạn có thể dùng key <strong>123</strong> hoặc nhập key OpenRouter nếu muốn.
      </div>
    </div>

    <div class="input-area">
      <input type="text" id="userInput" class="input-msg" placeholder="Nhập tin nhắn của bạn..." />
      <button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
    </div>
  </div>

  <script>
    const chatArea = document.getElementById('chatArea');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const apiKeyInput = document.getElementById('apiKey');

    function addMessage(text, isUser = false) {
      const msg = document.createElement('div');
      msg.classList.add('message', isUser ? 'user' : 'bot');
      msg.innerHTML = text.replace(/\n/g, '<br>');
      chatArea.appendChild(msg);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;

      addMessage(message, true);
      userInput.value = '';

      const API_KEY = apiKeyInput.value.trim();
      if (!API_KEY) {
        addMessage("Vui lòng nhập API Key (mặc định là 123) để chat nhé!", false);
        return;
      }

      // Typing indicator
      const typingMsg = document.createElement('div');
      typingMsg.classList.add('message', 'bot');
      typingMsg.innerHTML = 'Đang suy nghĩ... 💭';
      chatArea.appendChild(typingMsg);
      chatArea.scrollTop = chatArea.scrollHeight;

      try {
        // Gọi API OpenRouter nếu key dài (dạng sk-or...)
        // Nếu key là "123" thì giả lập phản hồi để demo, không gọi thật
        let reply = '';
        
        if (API_KEY === '123') {
          // Giả lập phản hồi cho key mặc định 123
          await new Promise(resolve => setTimeout(resolve, 800)); // delay giả lập
          reply = `Bạn đã dùng key mặc định 123. Đây là tin nhắn demo từ hệ thống.\n\nBạn nói: "${message}"\n\n(Để dùng AI thật, hãy nhập OpenRouter key dạng sk-or...).`;
        } else {
          // Gọi thật OpenRouter
          const response = await fetch('https://openrouter.ai/api/v1/chat/completions', {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${API_KEY}`,
              'Content-Type': 'application/json',
              'X-Title': 'Neon AI Chatbot by tkhang'
            },
            body: JSON.stringify({
              model: 'arcee-ai/trinity-large-preview:free',
              messages: [
                { role: 'system', content: 'Bạn là AI trợ lý thông minh, hài hước, thân thiện, trả lời tự nhiên bằng tiếng Việt, phong cách neon vui vẻ và hiện đại.' },
                { role: 'user', content: message }
              ],
              temperature: 0.75,
              max_tokens: 1200,
              stream: false
            })
          });

          if (!response.ok) {
            const errorText = await response.text();
            throw new Error(`Lỗi ${response.status}: ${response.statusText} - ${errorText}`);
          }

          const data = await response.json();
          reply = data.choices[0].message.content;
        }

        typingMsg.remove();
        addMessage(reply);
      } catch (err) {
        typingMsg.remove();
        let errorMsg = `Ối! Có lỗi: ${err.message}`;
        if (err.message.includes('401')) {
          errorMsg += "<br>Key không hợp lệ hoặc đã bị thu hồi. Hãy tạo key mới tại openrouter.ai/keys";
        } else if (err.message.includes('429')) {
          errorMsg += "<br>Đã hết giới hạn free hôm nay (~50-200 tin/ngày). Chờ reset hoặc thử key khác.";
        }
        addMessage(errorMsg, false);
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
