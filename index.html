<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trợ lí AI Tấn Khang - Siêu Trí Tuệ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
    }

    :root {
      --neon-purple: #a78bfa;
      --neon-pink: #f472b6;
      --neon-blue: #38bdf8;
      --neon-glow: 0 0 10px #a78bfa, 0 0 20px #7c3aed66;
      --bg-dark: #0a0a14;
      --bg-light: #f0f2f5;
      --card-bg-dark: #1a1a2ed9;
      --card-bg-light: #ffffff;
      --text-dark: #e5e7eb;
      --text-light: #1f2937;
      --border-dark: #33415566;
      --border-light: #e5e7eb;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-dark);
      height: 100vh;
      display: flex;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    body.light-mode {
      background: var(--bg-light);
      color: var(--text-light);
    }

    /* Hiệu ứng vũ trụ siêu ảo */
    body:not(.light-mode)::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 10px 10px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 20px 30px, #a78bfa, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, #f472b6, rgba(0,0,0,0)),
        radial-gradient(3px 3px at 80px 120px, #38bdf8, rgba(0,0,0,0));
      background-size: 200px 200px;
      background-repeat: repeat;
      opacity: 0.3;
      animation: stars 60s linear infinite;
    }

    @keyframes stars {
      from { transform: translateY(0); }
      to { transform: translateY(-200px); }
    }

    /* Main Layout */
    .app {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
    }

    /* Sidebar nâng cấp */
    .sidebar {
      width: 300px;
      background: var(--card-bg-dark);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border-dark);
      display: flex;
      flex-direction: column;
      transition: all 0.3s;
    }

    .light-mode .sidebar {
      background: var(--card-bg-light);
      border-right: 1px solid var(--border-light);
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-dark);
    }

    .new-chat-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .new-chat-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 30px var(--neon-purple);
    }

    .model-selector {
      margin-top: 20px;
    }

    .model-label {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 8px;
    }

    .model-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }

    .model-card {
      background: #ffffff1a;
      border: 1px solid var(--border-dark);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      font-size: 0.9rem;
    }

    .model-card:hover {
      border-color: var(--neon-purple);
      background: #ffffff30;
      transform: translateY(-2px);
    }

    .model-card.active {
      border-color: var(--neon-purple);
      background: linear-gradient(135deg, #a78bfa30, #f472b630);
      box-shadow: 0 0 15px var(--neon-purple);
    }

    .model-icon {
      font-size: 1.2rem;
      margin-bottom: 5px;
    }

    .chat-history {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    .history-item {
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #cbd5e1;
      transition: all 0.2s;
      font-size: 0.95rem;
    }

    .history-item:hover {
      background: #ffffff1a;
    }

    .history-item i {
      width: 20px;
      color: var(--neon-purple);
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-dark);
    }

    .light-mode .main-content {
      background: var(--bg-light);
    }

    /* Header */
    .header {
      padding: 15px 30px;
      border-bottom: 1px solid var(--border-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .menu-btn {
      background: none;
      border: none;
      color: var(--neon-purple);
      font-size: 1.3rem;
      cursor: pointer;
      display: none;
    }

    .header-title h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-controls {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .api-status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #ffffff1a;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
    }

    .theme-toggle {
      background: #ffffff1a;
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
    }

    .theme-toggle:hover {
      background: var(--neon-purple);
      transform: rotate(15deg);
    }

    /* API Section */
    .api-section {
      padding: 15px 30px;
      border-bottom: 1px solid var(--border-dark);
    }

    .api-input-wrapper {
      display: flex;
      gap: 10px;
    }

    .api-input {
      flex: 1;
      padding: 12px 20px;
      background: #ffffff1a;
      border: 1px solid var(--border-dark);
      border-radius: 30px;
      color: white;
      font-size: 0.95rem;
      transition: all 0.3s;
    }

    .api-input:focus {
      outline: none;
      border-color: var(--neon-purple);
      box-shadow: 0 0 15px var(--neon-purple);
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 25px;
    }

    .message {
      max-width: 85%;
      padding: 18px 22px;
      border-radius: 25px;
      line-height: 1.6;
      animation: messageIn 0.3s;
      position: relative;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }

    .user-message {
      align-self: flex-end;
      background: linear-gradient(135deg, #6d28d9, #a78bfa);
      color: white;
      border-bottom-right-radius: 5px;
    }

    .bot-message {
      align-self: flex-start;
      background: var(--card-bg-dark);
      backdrop-filter: blur(10px);
      border: 1px solid var(--neon-purple);
      border-bottom-left-radius: 5px;
    }

    .light-mode .bot-message {
      background: var(--card-bg-light);
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 0.95rem;
      opacity: 0.9;
    }

    .message-content {
      word-wrap: break-word;
    }

    .message-content pre {
      background: #1e1e2e;
      border-radius: 12px;
      padding: 15px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .message-footer {
      display: flex;
      justify-content: flex-end;
      gap: 15px;
      margin-top: 12px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .message:hover .message-footer {
      opacity: 1;
    }

    .message-footer button {
      background: none;
      border: none;
      color: var(--neon-purple);
      cursor: pointer;
      font-size: 1rem;
      padding: 5px;
      border-radius: 5px;
      transition: all 0.2s;
    }

    .message-footer button:hover {
      background: #ffffff1a;
      transform: scale(1.1);
    }

    /* Stream typing */
    .streaming .message-content {
      border-right: 2px solid var(--neon-purple);
      animation: blink 1s infinite;
    }

    @keyframes blink {
      0%, 100% { border-color: transparent; }
      50% { border-color: var(--neon-purple); }
    }

    /* File upload area */
    .file-upload-area {
      padding: 0 30px 15px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .file-btn {
      background: #ffffff1a;
      border: 1px solid var(--border-dark);
      padding: 8px 16px;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
      transition: all 0.3s;
    }

    .file-btn:hover {
      border-color: var(--neon-purple);
      background: #ffffff30;
    }

    .file-preview {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .file-preview-item {
      background: #ffffff1a;
      border-radius: 10px;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .file-preview-item i {
      color: var(--neon-purple);
    }

    .remove-file {
      color: #ef4444;
      cursor: pointer;
      margin-left: 5px;
    }

    /* Suggested questions */
    .suggested-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 30px 20px;
    }

    .suggested-question {
      background: #ffffff1a;
      border: 1px solid var(--border-dark);
      padding: 10px 18px;
      border-radius: 25px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .suggested-question:hover {
      border-color: var(--neon-purple);
      background: #ffffff30;
      transform: translateY(-2px);
    }

    /* Input Area siêu cấp */
    .input-area {
      padding: 20px 30px;
      border-top: 1px solid var(--border-dark);
    }

    .input-wrapper {
      background: #ffffff1a;
      border: 1px solid var(--border-dark);
      border-radius: 30px;
      padding: 12px 20px;
      display: flex;
      align-items: flex-end;
      gap: 15px;
      transition: all 0.3s;
    }

    .input-wrapper:focus-within {
      border-color: var(--neon-purple);
      box-shadow: 0 0 20px var(--neon-purple);
    }

    .input-wrapper textarea {
      flex: 1;
      background: none;
      border: none;
      color: white;
      font-size: 1rem;
      resize: none;
      max-height: 150px;
      outline: none;
      font-family: inherit;
      line-height: 1.5;
    }

    .light-mode .input-wrapper textarea {
      color: #1f2937;
    }

    .input-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .input-actions button {
      background: none;
      border: none;
      color: var(--neon-purple);
      font-size: 1.3rem;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
      transition: all 0.3s;
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .input-actions button:hover {
      background: #ffffff1a;
      transform: scale(1.1);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)) !important;
      color: white !important;
      border: none !important;
    }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 15px 20px;
      background: var(--card-bg-dark);
      border-radius: 25px;
      border: 1px solid var(--neon-purple);
      align-self: flex-start;
    }

    .thinking-dots {
      display: flex;
      gap: 5px;
    }

    .thinking-dots span {
      width: 8px;
      height: 8px;
      background: var(--neon-purple);
      border-radius: 50%;
      animation: thinking 1.4s infinite;
    }

    .thinking-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .thinking-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes thinking {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-10px); opacity: 1; }
    }

    @keyframes messageIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        left: -300px;
        height: 100%;
        z-index: 100;
      }

      .sidebar.show {
        left: 0;
      }

      .menu-btn {
        display: block;
      }

      .message {
        max-width: 95%;
      }

      .model-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" onclick="newChat()">
          <i class="fas fa-plus"></i> New Chat
        </button>
        
        <div class="model-selector">
          <div class="model-label">🌐 Chọn siêu trí tuệ</div>
          <div class="model-grid" id="modelGrid">
            <div class="model-card active" onclick="selectModel('gpt4', this)" data-model="openai/gpt-4-turbo-preview">
              <div class="model-icon">🤖</div>
              <div>GPT-4 Turbo</div>
            </div>
            <div class="model-card" onclick="selectModel('claude3', this)" data-model="anthropic/claude-3-opus">
              <div class="model-icon">🧠</div>
              <div>Claude 3 Opus</div>
            </div>
            <div class="model-card" onclick="selectModel('grok', this)" data-model="x-ai/grok-1">
              <div class="model-icon">🌌</div>
              <div>Grok-1</div>
            </div>
            <div class="model-card" onclick="selectModel('deepseek', this)" data-model="deepseek/deepseek-chat">
              <div class="model-icon">🔮</div>
              <div>DeepSeek</div>
            </div>
            <div class="model-card" onclick="selectModel('gemini', this)" data-model="google/gemini-pro">
              <div class="model-icon">✨</div>
              <div>Gemini Pro</div>
            </div>
            <div class="model-card" onclick="selectModel('llama3', this)" data-model="meta-llama/llama-3-70b-instruct">
              <div class="model-icon">🦙</div>
              <div>Llama 3 70B</div>
            </div>
          </div>
        </div>
      </div>

      <div class="chat-history" id="chatHistory">
        <div class="history-item">
          <i class="fas fa-message"></i>
          <span>Cuộc trò chuyện hôm nay</span>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header -->
      <div class="header">
        <div class="header-title">
          <i class="fas fa-bars menu-btn" onclick="toggleSidebar()"></i>
          <h1>Trợ lí AI Tấn Khang</h1>
        </div>
        <div class="header-controls">
          <div class="api-status">
            <span class="status-dot"></span>
            <span id="modelName">GPT-4 Turbo</span>
          </div>
          <button class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-moon" id="themeIcon"></i>
          </button>
        </div>
      </div>

      <!-- API Section -->
      <div class="api-section">
        <div class="api-input-wrapper">
          <input type="password" id="apiKey" class="api-input" placeholder="🔑 Nhập OpenRouter API Key (sk-or-...)" value="">
          <button class="file-btn" onclick="checkKeyBalance()" title="Kiểm tra số dư">
            <i class="fas fa-coins"></i>
          </button>
        </div>
      </div>

      <!-- Chat Area -->
      <div class="chat-area" id="chatArea"></div>

      <!-- File Upload Area -->
      <div class="file-upload-area">
        <button class="file-btn" onclick="triggerFileUpload()">
          <i class="fas fa-file-pdf"></i> PDF
        </button>
        <button class="file-btn" onclick="triggerImageUpload()">
          <i class="fas fa-image"></i> Ảnh
        </button>
        <button class="file-btn" onclick="triggerWebSearch()">
          <i class="fas fa-globe"></i> Tìm kiếm
        </button>
        <button class="file-btn" onclick="generateImage()">
          <i class="fas fa-paint-brush"></i> Tạo ảnh
        </button>
        <input type="file" id="fileUpload" accept=".pdf,.doc,.docx,.txt" style="display: none;" multiple>
        <input type="file" id="imageUpload" accept="image/*" style="display: none;" multiple>
      </div>

      <!-- File Preview -->
      <div class="file-preview" id="filePreview"></div>

      <!-- Suggested Questions -->
      <div class="suggested-questions" id="suggestedQuestions">
        <div class="suggested-question" onclick="askQuestion('Giải thích thuyết tương đối một cách đơn giản')">
          <i class="fas fa-atom"></i> Thuyết tương đối
        </div>
        <div class="suggested-question" onclick="askQuestion('Viết code Python cho neural network từ đầu')">
          <i class="fas fa-code"></i> Neural network
        </div>
        <div class="suggested-question" onclick="askQuestion('So sánh các mô hình AI hàng đầu hiện nay')">
          <i class="fas fa-chart-line"></i> So sánh AI
        </div>
        <div class="suggested-question" onclick="askQuestion('Cách học machine learning hiệu quả trong 6 tháng')">
          <i class="fas fa-graduation-cap"></i> Lộ trình ML
        </div>
        <div class="suggested-question" onclick="askQuestion('Giải phương trình vi phân cấp 2')">
          <i class="fas fa-square-root-variable"></i> Toán cao cấp
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="userInput" placeholder="Hỏi tôi bất cứ điều gì... (Shift + Enter để xuống dòng)" rows="1"></textarea>
          <div class="input-actions">
            <button onclick="toggleVoice()" id="voiceBtn" title="Nhập giọng nói">
              <i class="fas fa-microphone"></i>
            </button>
            <button onclick="attachFile()" title="Đính kèm file">
              <i class="fas fa-paperclip"></i>
            </button>
            <button class="send-btn" onclick="sendMessage()" title="Gửi (Enter)">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Cấu hình
    let currentModel = 'openai/gpt-4-turbo-preview';
    let currentFiles = [];
    let isRecording = false;
    let recognition = null;
    let darkMode = true;
    let isStreaming = false;

    // Khởi tạo voice
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'vi-VN';
      
      recognition.onresult = (event) => {
        document.getElementById('userInput').value = event.results[0][0].transcript;
        stopRecording();
      };
    }

    // Load welcome message
    window.onload = () => {
      showWelcomeMessage();
    };

    function showWelcomeMessage() {
      const welcome = `
# 🚀 Chào mừng đến với **Trợ lí AI Tấn Khang Siêu Trí Tuệ**

Tôi được tích hợp **6 siêu trí tuệ nhân tạo hàng đầu thế giới**:

## 🌟 **Hệ thống AI đa dạng:**
| Mô hình | Ưu điểm vượt trội |
|---------|-------------------|
| 🤖 **GPT-4 Turbo** | Lập trình, phân tích chuyên sâu |
| 🧠 **Claude 3 Opus** | Xử lý ngữ cảnh siêu dài (1M token) |
| 🌌 **Grok-1** | Hài hước, cập nhật thời gian thực |
| 🔮 **DeepSeek** | Tính toán chính xác như Wolfram |
| ✨ **Gemini Pro** | Đa phương thức, hiểu ảnh/video |
| 🦙 **Llama 3 70B** | Mã nguồn mở, miễn phí |

## ⚡ **Tính năng siêu việt:**
- ✅ **Trả lời realtime** (streaming) như đang chat
- ✅ **Đọc mọi định dạng file** (PDF, Word, Excel, Ảnh)
- ✅ **Tìm kiếm web** cập nhật thông tin mới nhất
- ✅ **Tạo ảnh bằng AI** (DALL-E, Stable Diffusion)
- ✅ **Tính toán chính xác** giải phương trình, tích phân
- ✅ **Xử lý ngữ cảnh** lên đến 1 triệu token

## 📝 **Hướng dẫn sử dụng:**

    async function addBotMessage(content, files = null) {
      const chatArea = document.getElementById('chatArea');
      
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message bot-message';
      
      const header = document.createElement('div');
      header.className = 'message-header';
      header.innerHTML = `<i class="fas fa-robot" style="color: ${getModelColor()}"></i> <span>${getModelName()}</span>`;
      messageDiv.appendChild(header);
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      messageDiv.appendChild(contentDiv);
      
      const footer = document.createElement('div');
      footer.className = 'message-footer';

        <button onclick="copyMessage(this)"><i class="far fa-copy"></i></button>

    // Thêm tin nhắn user
    function addUserMessage(content, files = null) {
      const chatArea = document.getElementById('chatArea');
      
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message user-message';
      
      const header = document.createElement('div');
      header.className = 'message-header';
      header.innerHTML = '<i class="fas fa-user"></i> <span>Bạn</span>';
      messageDiv.appendChild(header);
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = marked.parse(content);
      messageDiv.appendChild(contentDiv);
      
      chatArea.appendChild(messageDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Hiển thị thinking
    function showThinking() {
      const chatArea = document.getElementById('chatArea');
      const thinkingDiv = document.createElement('div');
      thinkingDiv.className = 'thinking';
      thinkingDiv.id = 'thinkingIndicator';
      thinkingDiv.innerHTML = `
        <i class="fas fa-robot" style="color: var(--neon-purple);"></i>
        <div class="thinking-dots">
          <span></span><span></span><span></span>
        </div>
        <span>${getModelName()} đang suy nghĩ...</span>
      `;
      chatArea.appendChild(thinkingDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideThinking() {
      const thinking = document.getElementById('thinkingIndicator');
      if (thinking) thinking.remove();
    }
