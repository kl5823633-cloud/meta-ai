<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Trợ lí AI Tấn Khang - Siêu Trí Tuệ</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }

    :root {
      --neon-purple: #a78bfa;
      --neon-pink: #f472b6;
      --neon-blue: #38bdf8;
      --neon-glow: 0 0 10px #a78bfa, 0 0 20px #7c3aed66;
      --bg-dark: #0a0a14;
      --bg-light: #f0f2f5;
      --card-bg-dark: #1a1a2ed9;
      --card-bg-light: #ffffff;
      --text-dark: #e5e7eb;
      --text-light: #1f2937;
      --border-dark: #33415566;
      --border-light: #e5e7eb;
    }

    body {
      background: var(--bg-dark);
      color: var(--text-dark);
      height: 100vh;
      display: flex;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    body.light-mode {
      background: var(--bg-light);
      color: var(--text-light);
    }

    /* Hiệu ứng vũ trụ */
    body:not(.light-mode)::before {
      content: "";
      position: absolute;
      width: 100%;
      height: 100%;
      background-image: 
        radial-gradient(2px 2px at 10px 10px, #fff, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 20px 30px, #a78bfa, rgba(0,0,0,0)),
        radial-gradient(2px 2px at 40px 70px, #f472b6, rgba(0,0,0,0)),
        radial-gradient(3px 3px at 80px 120px, #38bdf8, rgba(0,0,0,0));
      background-size: 200px 200px;
      background-repeat: repeat;
      opacity: 0.3;
      animation: stars 60s linear infinite;
      pointer-events: none;
    }

    @keyframes stars {
      from { transform: translateY(0); }
      to { transform: translateY(-200px); }
    }

    /* Main Layout */
    .app {
      display: flex;
      width: 100%;
      height: 100%;
      position: relative;
      z-index: 2;
    }

    /* Sidebar */
    .sidebar {
      width: 280px;
      background: var(--card-bg-dark);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--border-dark);
      display: flex;
      flex-direction: column;
      transition: all 0.3s;
    }

    .light-mode .sidebar {
      background: var(--card-bg-light);
      border-right: 1px solid var(--border-light);
    }

    .sidebar-header {
      padding: 20px;
      border-bottom: 1px solid var(--border-dark);
    }

    .new-chat-btn {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink));
      border: none;
      border-radius: 10px;
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: all 0.3s;
    }

    .new-chat-btn:hover {
      transform: scale(1.02);
      box-shadow: 0 0 20px var(--neon-purple);
    }

    .model-selector {
      margin-top: 20px;
    }

    .model-label {
      font-size: 0.9rem;
      color: #94a3b8;
      margin-bottom: 10px;
    }

    .model-grid {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .model-card {
      background: #ffffff1a;
      border: 1px solid var(--border-dark);
      border-radius: 8px;
      padding: 10px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .model-card:hover {
      border-color: var(--neon-purple);
      background: #ffffff30;
      transform: translateX(5px);
    }

    .model-card.active {
      border-color: var(--neon-purple);
      background: linear-gradient(135deg, #a78bfa30, #f472b630);
      box-shadow: 0 0 15px var(--neon-purple);
    }

    .model-icon {
      font-size: 1.3rem;
    }

    /* Main Content */
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      padding: 15px 30px;
      border-bottom: 1px solid var(--border-dark);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title h1 {
      font-size: 1.5rem;
      font-weight: 700;
      background: linear-gradient(135deg, #fff, var(--neon-purple));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-controls {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .api-status {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #ffffff1a;
      padding: 8px 15px;
      border-radius: 20px;
      font-size: 0.9rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 10px #4ade80;
    }

    .theme-toggle {
      background: #ffffff1a;
      border: none;
      color: white;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 1.2rem;
      transition: all 0.3s;
    }

    .theme-toggle:hover {
      background: var(--neon-purple);
      transform: rotate(15deg);
    }

    /* API Section */
    .api-section {
      padding: 15px 30px;
      border-bottom: 1px solid var(--border-dark);
    }

    .api-input-wrapper {
      display: flex;
      gap: 10px;
    }

    .api-input {
      flex: 1;
      padding: 12px 20px;
      background: #ffffff1a;
      border: 1px solid var(--border-dark);
      border-radius: 30px;
      color: white;
      font-size: 0.95rem;
    }

    .api-input:focus {
      outline: none;
      border-color: var(--neon-purple);
      box-shadow: 0 0 15px var(--neon-purple);
    }

    /* Chat Area */
    .chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 30px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .message {
      max-width: 85%;
      padding: 15px 20px;
      border-radius: 20px;
      line-height: 1.6;
      animation: fadeIn 0.3s;
      position: relative;
    }

    .user-message {
      align-self: flex-end;
      background: linear-gradient(135deg, #6d28d9, #a78bfa);
      color: white;
      border-bottom-right-radius: 5px;
    }

    .bot-message {
      align-self: flex-start;
      background: var(--card-bg-dark);
      backdrop-filter: blur(10px);
      border: 1px solid var(--neon-purple);
      border-bottom-left-radius: 5px;
    }

    .light-mode .bot-message {
      background: var(--card-bg-light);
      color: #1f2937;
    }

    .message-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      font-size: 0.9rem;
      opacity: 0.8;
    }

    .message-content {
      word-wrap: break-word;
    }

    .message-content pre {
      background: #1e1e2e;
      border-radius: 10px;
      padding: 12px;
      overflow-x: auto;
      margin: 10px 0;
    }

    .message-footer {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .message:hover .message-footer {
      opacity: 1;
    }

    .message-footer button {
      background: none;
      border: none;
      color: var(--neon-purple);
      cursor: pointer;
      padding: 5px;
      border-radius: 5px;
    }

    /* Thinking indicator */
    .thinking {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 15px 20px;
      background: var(--card-bg-dark);
      border-radius: 20px;
      border: 1px solid var(--neon-purple);
      align-self: flex-start;
    }

    .thinking-dots {
      display: flex;
      gap: 5px;
    }

    .thinking-dots span {
      width: 8px;
      height: 8px;
      background: var(--neon-purple);
      border-radius: 50%;
      animation: thinking 1.4s infinite;
    }

    .thinking-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .thinking-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes thinking {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.6; }
      30% { transform: translateY(-10px); opacity: 1; }
    }

    /* Suggested questions */
    .suggested-questions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      padding: 0 30px 20px;
    }

    .suggested-question {
      background: #ffffff1a;
      border: 1px solid var(--border-dark);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 0.9rem;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .suggested-question:hover {
      border-color: var(--neon-purple);
      background: #ffffff30;
      transform: translateY(-2px);
    }

    /* Input Area */
    .input-area {
      padding: 20px 30px;
      border-top: 1px solid var(--border-dark);
    }

    .input-wrapper {
      background: #ffffff1a;
      border: 1px solid var(--border-dark);
      border-radius: 30px;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .input-wrapper textarea {
      flex: 1;
      background: none;
      border: none;
      color: white;
      font-size: 1rem;
      resize: none;
      max-height: 100px;
      outline: none;
      font-family: inherit;
    }

    .light-mode .input-wrapper textarea {
      color: #1f2937;
    }

    .input-actions {
      display: flex;
      gap: 10px;
    }

    .input-actions button {
      background: none;
      border: none;
      color: var(--neon-purple);
      font-size: 1.2rem;
      cursor: pointer;
      padding: 5px;
      border-radius: 50%;
      transition: all 0.3s;
    }

    .input-actions button:hover {
      background: #ffffff1a;
      transform: scale(1.1);
    }

    .send-btn {
      background: linear-gradient(135deg, var(--neon-purple), var(--neon-pink)) !important;
      color: white !important;
      width: 45px;
      height: 45px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      cursor: pointer;
    }

    /* File buttons */
    .file-actions {
      display: flex;
      gap: 10px;
      padding: 0 30px 15px;
    }

    .file-btn {
      background: #ffffff1a;
      border: 1px solid var(--border-dark);
      padding: 8px 15px;
      border-radius: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.9rem;
    }

    .file-btn:hover {
      border-color: var(--neon-purple);
      background: #ffffff30;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .sidebar {
        position: absolute;
        left: -280px;
        height: 100%;
        z-index: 100;
      }
      .sidebar.show {
        left: 0;
      }
      .message {
        max-width: 95%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="new-chat-btn" onclick="newChat()">
          <i class="fas fa-plus"></i> New Chat
        </button>
        
        <div class="model-selector">
          <div class="model-label">🌐 Chọn siêu trí tuệ</div>
          <div class="model-grid" id="modelGrid">
            <div class="model-card active" onclick="selectModel('openai/gpt-4-turbo-preview', this)">
              <span class="model-icon">🤖</span>
              <span>GPT-4 Turbo</span>
            </div>
            <div class="model-card" onclick="selectModel('anthropic/claude-3-opus', this)">
              <span class="model-icon">🧠</span>
              <span>Claude 3 Opus</span>
            </div>
            <div class="model-card" onclick="selectModel('x-ai/grok-1', this)">
              <span class="model-icon">🌌</span>
              <span>Grok-1</span>
            </div>
            <div class="model-card" onclick="selectModel('deepseek/deepseek-chat', this)">
              <span class="model-icon">🔮</span>
              <span>DeepSeek</span>
            </div>
            <div class="model-card" onclick="selectModel('google/gemini-pro', this)">
              <span class="model-icon">✨</span>
              <span>Gemini Pro</span>
            </div>
            <div class="model-card" onclick="selectModel('meta-llama/llama-3-70b-instruct', this)">
              <span class="model-icon">🦙</span>
              <span>Llama 3 70B</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
      <!-- Header -->
      <div class="header">
        <div class="header-title">
          <i class="fas fa-bars menu-btn" style="display: none; margin-right: 15px; cursor: pointer;" onclick="toggleSidebar()"></i>
          <h1>Trợ lí AI Tấn Khang</h1>
        </div>
        <div class="header-controls">
          <div class="api-status">
            <span class="status-dot"></span>
            <span id="modelName">GPT-4 Turbo</span>
          </div>
          <button class="theme-toggle" onclick="toggleTheme()">
            <i class="fas fa-moon" id="themeIcon"></i>
          </button>
        </div>
      </div>

      <!-- API Section -->
      <div class="api-section">
        <div class="api-input-wrapper">
          <input type="password" id="apiKey" class="api-input" placeholder="🔑 Nhập API Key (dùng '123' để demo)" value="123">
        </div>
      </div>

      <!-- Chat Area -->
      <div class="chat-area" id="chatArea">
        <!-- Tin nhắn chào mừng sẽ được thêm bằng JavaScript -->
      </div>

      <!-- File Actions -->
      <div class="file-actions">
        <button class="file-btn" onclick="alert('Tính năng đang phát triển!')">
          <i class="fas fa-file-pdf"></i> PDF
        </button>
        <button class="file-btn" onclick="triggerImageUpload()">
          <i class="fas fa-image"></i> Ảnh
        </button>
        <button class="file-btn" onclick="alert('Tính năng đang phát triển!')">
          <i class="fas fa-globe"></i> Tạo ảnh
        </button>
        <input type="file" id="imageUpload" accept="image/*" style="display: none;">
      </div>

      <!-- Suggested Questions -->
      <div class="suggested-questions" id="suggestedQuestions">
        <div class="suggested-question" onclick="askQuestion('Thuyết tương đối là gì?')">
          <i class="fas fa-atom"></i> Thuyết tương đối
        </div>
        <div class="suggested-question" onclick="askQuestion('Viết code neural network bằng Python')">
          <i class="fas fa-code"></i> Neural network
        </div>
        <div class="suggested-question" onclick="askQuestion('So sánh ChatGPT, Claude và Gemini')">
          <i class="fas fa-chart-line"></i> So sánh AI
        </div>
        <div class="suggested-question" onclick="askQuestion('Lộ trình học Machine Learning')">
          <i class="fas fa-graduation-cap"></i> Lộ trình ML
        </div>
        <div class="suggested-question" onclick="askQuestion('Giải phương trình vi phân')">
          <i class="fas fa-square-root-variable"></i> Toán cao cấp
        </div>
      </div>

      <!-- Input Area -->
      <div class="input-area">
        <div class="input-wrapper">
          <textarea id="userInput" placeholder="Nhập tin nhắn của bạn..." rows="1"></textarea>
          <div class="input-actions">
            <button onclick="toggleVoice()" id="voiceBtn" title="Nhập giọng nói">
              <i class="fas fa-microphone"></i>
            </button>
            <button class="send-btn" onclick="sendMessage()" title="Gửi">
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Khởi tạo biến
    let currentModel = 'openai/gpt-4-turbo-preview';
    let currentModelName = 'GPT-4 Turbo';
    let currentImage = null;
    let isRecording = false;
    let recognition = null;
    let darkMode = true;

    // Khởi tạo voice recognition
    if ('webkitSpeechRecognition' in window) {
      recognition = new webkitSpeechRecognition();
      recognition.continuous = false;
      recognition.interimResults = false;
      recognition.lang = 'vi-VN';
      
      recognition.onresult = (event) => {
        document.getElementById('userInput').value = event.results[0][0].transcript;
        stopRecording();
      };
      
      recognition.onerror = () => stopRecording();
    }

    // Hàm khởi tạo - chạy khi trang load
    window.onload = function() {
      // Thêm tin nhắn chào mừng
      const chatArea = document.getElementById('chatArea');
      chatArea.innerHTML = ''; // Xóa nếu có
      
      addBotMessage(`
# 👋 Chào bạn! Tôi là **Trợ lí AI Tấn Khang**

## ✨ **Tính năng nổi bật:**
- 🎯 **Siêu thông minh** với 6 mô hình AI hàng đầu
- ⚡ **Trả lời nhanh**, chính xác
- 💬 **Chat liền mạch**, không lag
- 🌓 **Dark/Light mode** bảo vệ mắt
- 🎤 **Nhập bằng giọng nói**
- 📝 **Highlight code** đẹp mắt

## 🚀 **Cách sử dụng:**
1. **Dùng thử ngay** với key mặc định "123"
2. Hoặc nhập **OpenRouter API key** để siêu thông minh
3. Chọn **mô hình AI** ở sidebar
4. **Bắt đầu chat!**

*Hãy hỏi tôi bất cứ điều gì bạn muốn!* 💜
      `);
    };

    // Thêm tin nhắn bot
    function addBotMessage(content) {
      const chatArea = document.getElementById('chatArea');
      
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message bot-message';
      
      const header = document.createElement('div');
      header.className = 'message-header';
      header.innerHTML = `<i class="fas fa-robot" style="color: var(--neon-purple);"></i> <span>${currentModelName}</span>`;
      messageDiv.appendChild(header);
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = marked.parse(content);
      messageDiv.appendChild(contentDiv);
      
      const footer = document.createElement('div');
      footer.className = 'message-footer';
      footer.innerHTML = `
        <button onclick="copyMessage(this)"><i class="far fa-copy"></i></button>
        <button onclick="reactMessage(this, 'like')"><i class="far fa-thumbs-up"></i></button>
        <button onclick="reactMessage(this, 'dislike')"><i class="far fa-thumbs-down"></i></button>
      `;
      messageDiv.appendChild(footer);
      
      chatArea.appendChild(messageDiv);
      
      // Highlight code
      document.querySelectorAll('pre code').forEach(block => {
        hljs.highlightElement(block);
      });
      
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Thêm tin nhắn user
    function addUserMessage(content) {
      const chatArea = document.getElementById('chatArea');
      
      const messageDiv = document.createElement('div');
      messageDiv.className = 'message user-message';
      
      const header = document.createElement('div');
      header.className = 'message-header';
      header.innerHTML = '<i class="fas fa-user"></i> <span>Bạn</span>';
      messageDiv.appendChild(header);
      
      const contentDiv = document.createElement('div');
      contentDiv.className = 'message-content';
      contentDiv.innerHTML = marked.parse(content);
      messageDiv.appendChild(contentDiv);
      
      chatArea.appendChild(messageDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    // Hiển thị thinking
    function showThinking() {
      const chatArea = document.getElementById('chatArea');
      const thinkingDiv = document.createElement('div');
      thinkingDiv.className = 'thinking';
      thinkingDiv.id = 'thinkingIndicator';
      thinkingDiv.innerHTML = `
        <i class="fas fa-robot" style="color: var(--neon-purple);"></i>
        <div class="thinking-dots">
          <span></span><span></span><span></span>
        </div>
        <span>${currentModelName} đang suy nghĩ...</span>
      `;
      chatArea.appendChild(thinkingDiv);
      chatArea.scrollTop = chatArea.scrollHeight;
    }

    function hideThinking() {
      const thinking = document.getElementById('thinkingIndicator');
      if (thinking) thinking.remove();
    }

    // Hàm gửi tin nhắn - QUAN TRỌNG
    window.sendMessage = function() {
      const input = document.getElementById('userInput');
      const message = input.value.trim();
      
      if (!message) return;
      
      // Thêm tin nhắn user
      addUserMessage(message);
      input.value = '';
      input.style.height = 'auto';
      
      // Lấy API key
      const API_KEY = document.getElementById('apiKey').value.trim();
      
      // Hiển thị thinking
      showThinking();
      
      // Mô phỏng xử lý (vì đang demo)
      setTimeout(function() {
        hideThinking();
        
        let reply = '';
        
        if (message.toLowerCase().includes('xin chào') || message.toLowerCase().includes('hello')) {
          reply = `# 👋 Chào bạn!

Rất vui được gặp bạn! Tôi là **Trợ lí AI Tấn Khang** - trợ lý AI siêu thông minh của bạn.

## 💡 **Tôi có thể giúp gì cho bạn?**
- Giải thích kiến thức khoa học, công nghệ
- Viết code, debug lỗi
- Giải toán, phương trình
- Tư vấn học tập, lộ trình nghề nghiệp
- Và nhiều hơn thế nữa!

Bạn cần tôi hỗ trợ vấn đề gì không? Hãy hỏi tôi nhé! 😊`;
        } else if (message.toLowerCase().includes('code') || message.toLowerCase().includes('python')) {

def fibonacci(n):
    """Hàm tính dãy Fibonacci đến số thứ n"""
    if n <= 0:

    // Chọn model
    window.selectModel = function(model, element) {
      currentModel = model;
      
      // Cập nhật tên hiển thị
      const modelNames = {
        'openai/gpt-4-turbo-preview': 'GPT-4 Turbo',
        'anthropic/claude-3-opus': 'Claude 3 Opus',
        'x-ai/grok-1': 'Grok-1',
        'deepseek/deepseek-chat': 'DeepSeek',
        'google/gemini-pro': 'Gemini Pro',
        'meta-llama/llama-3-70b-instruct': 'Llama 3 70B'
      };
      currentModelName = modelNames[model] || 'AI';
      document.getElementById('modelName').textContent = currentModelName;
      
      // Cập nhật active state
      document.querySelectorAll('.model-card').forEach(card => {
        card.classList.remove('active');
      });
      element.classList.add('active');
    };

    // Voice
    window.toggleVoice = function() {
      if (!recognition) {
        alert('Trình duyệt không hỗ trợ nhập giọng nói!');
        return;
      }
      
      const btn = document.getElementById('voiceBtn');
      if (isRecording) {
        stopRecording();
      } else {
        recognition.start();
        isRecording = true;
        btn.style.color = '#ef4444';
        btn.innerHTML = '<i class="fas fa-stop"></i>';
      }
    };

    function stopRecording() {
      const btn = document.getElementById('voiceBtn');
      isRecording = false;
      btn.style.color = '';
      btn.innerHTML = '<i class="fas fa-microphone"></i>';
    }

    // Image upload
    window.triggerImageUpload = function() {
      document.getElementById('imageUpload').click();
    };

    document.getElementById('imageUpload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          addUserMessage('📷 Đã gửi hình ảnh');
          addBotMessage(`Cảm ơn bạn đã gửi ảnh! Tôi đã nhận được.\n\n**Tính năng phân tích ảnh đang được phát triển.**\n\nBạn có thể mô tả nội dung trong ảnh để tôi hỗ trợ nhé!`);
        };
        reader.readAsDataURL(file);
      }
    });

    // Copy message
    window.copyMessage = function(btn) {
      const content = btn.closest('.message').querySelector('.message-content').innerText;
      navigator.clipboard.writeText(content);
      
      const original = btn.innerHTML;
      btn.innerHTML = '<i class="fas fa-check"></i>';
      setTimeout(function() {
        btn.innerHTML = original;
      }, 2000);
    };

    // React message
    window.reactMessage = function(btn, type) {
      const original = btn.innerHTML;
      if (type === 'like') {
        btn.innerHTML = '<i class="fas fa-thumbs-up" style="color: #4ade80;"></i>';
      } else {
        btn.innerHTML = '<i class="fas fa-thumbs-down" style="color: #f87171;"></i>';
      }
      setTimeout(function() {
        btn.innerHTML = original;
      }, 2000);
    };

    // New chat
    window.newChat = function() {
      document.getElementById('chatArea').innerHTML = '';
      window.onload();
    };

    // Toggle theme
    window.toggleTheme = function() {
      const body = document.body;
      const icon = document.getElementById('themeIcon');
      
      body.classList.toggle('light-mode');
      
      if (body.classList.contains('light-mode')) {
        icon.className = 'fas fa-sun';
      } else {
        icon.className = 'fas fa-moon';
      }
    };

    // Toggle sidebar
    window.toggleSidebar = function() {
      document.getElementById('sidebar').classList.toggle('show');
    };

    // Ask suggested question
    window.askQuestion = function(question) {
      document.getElementById('userInput').value = question;
      sendMessage();
    };

    // Auto resize textarea
    document.getElementById('userInput').addEventListener('input', function() {
      this.style.height = 'auto';
      this.style.height = (this.scrollHeight) + 'px';
    });

    // Enter to send
    document.getElementById('userInput').addEventListener('keydown', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Responsive menu
    if (window.innerWidth <= 768) {
      document.querySelector('.menu-btn').style.display = 'block';
    }
  </script>
